services:
  frontend:
    build:
      context: ./frontend
      target: dev
    container_name: legoodanfitrion-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: npm run dev -- --host 0.0.0.0 --port 5173

  backend:
    image: node:20-alpine
    container_name: legoodanfitrion-backend
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - CORS_ORIGIN=http://localhost:5173,http://127.0.0.1:5173
    env_file:
      - ./backend/.env
    command: sh -c "npm install && npm run dev"
